<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site - Art</title>
<link rel="icon" href="/favicon.ico">

<style>

/* VOIDUI CORE */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:radial-gradient(circle at 50% 40%,rgba(150,0,255,0.35),#000);
}

/* HEADER */

.top{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.back{
  padding:10px 14px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  text-decoration:none;
  font-weight:bold;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:rgba(20,20,20,0.55);
  border-radius:14px;
  padding:10px;
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

/* FOOTER */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.05);
  font-size:14px;
  opacity:0.85;
}

footer a{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="top">
  <h2>🎨 Art</h2>
  <a class="back" href="/">← Back Home</a>
</div>

<div class="grid" id="grid"></div>

<footer>
  © 2026 Rip_Dead Studios™ —
  <a href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

const art=[
  {
    name:"Rip_Dead FNF",
    file:"/images/rip-fnf.png",
    size:"728 KB",
    tags:["Funkin"]
  }
];

const grid=document.getElementById("grid");

art.forEach(a=>{
  grid.innerHTML+=`
    <div class="card">
      <img src="${a.file}">
      <h3>${a.name}</h3>
      <div>${a.size}</div>
      <div>${a.tags.join(", ")}</div>
    </div>`;
});

</script>

</body>
</html>
