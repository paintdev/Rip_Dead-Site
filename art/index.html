<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site - Art</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOID BACKGROUND ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-3;

  background:
    radial-gradient(circle at 50% 40%,
      rgba(150,0,255,0.30),
      rgba(0,0,0,0.85) 60%,
      #000 100%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 25% 70%,
      rgba(170,0,255,0.18),
      transparent 60%),
    radial-gradient(circle at 75% 30%,
      rgba(0,255,200,0.12),
      transparent 55%);

  filter:blur(50px);
}

/* ================= HEADER ================= */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.back{
  padding:10px 14px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:0.25s;
}

.back:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* ================= SEARCH ================= */

.search{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.search input{
  width:320px;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* ================= TAGS ================= */

.tags{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.tag-btn{
  padding:8px 12px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.2s;
}

.tag-btn:hover{
  background:rgba(168,85,247,0.25);
  box-shadow:0 0 10px rgba(168,85,247,0.3);
}

/* ================= GRID ================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(12px);
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(168,85,247,0.25);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  cursor:pointer;
}

.info{
  padding:12px;
}

.download{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  text-decoration:none;
}

.download:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* ================= MODAL ================= */

#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#modal img{
  max-width:85%;
  max-height:85%;
  border-radius:12px;
}

/* hidden */
.hidden{display:none;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div class="title">🎨 Rip_Dead Art</div>
  <a class="back" href="/">← Back Home</a>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search art...">
</div>

<!-- TAGS -->
<div class="tags" id="tags"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

let data = [];
let activeTag = "all";

/* LOAD JSON (FIXED FOR GITHUB PAGES) */
async function loadArt(){
  try{
    const res = await fetch("./art.json");
    data = await res.json();

    renderTags();
    render();

  } catch(err){
    console.error("Failed to load art.json", err);
    document.getElementById("grid").innerHTML =
      "<p style='text-align:center'>Failed to load art.json</p>";
  }
}

loadArt();

/* TAGS */
function renderTags(){
  const set = new Set();

  data.forEach(i=>{
    (i.tags || []).forEach(t=>set.add(t));
  });

  const tags = document.getElementById("tags");

  tags.innerHTML = `<div class="tag-btn" onclick="setTag('all')">All</div>`;

  set.forEach(tag=>{
    tags.innerHTML += `
      <div class="tag-btn" onclick="setTag('${tag}')">${tag}</div>
    `;
  });
}

function setTag(tag){
  activeTag = tag;
  render();
}

/* RENDER GRID */
function render(){

  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  data.forEach(item=>{

    const tags = item.tags || [];

    const matchTag =
      activeTag === "all" || tags.includes(activeTag);

    const matchSearch =
      item.name.toLowerCase().includes(search) ||
      tags.join(" ").toLowerCase().includes(search);

    if(matchTag && matchSearch){

      grid.innerHTML += `
        <div class="card">
          <img src="${item.file}" onclick="openModal('${item.file}')">

          <div class="info">
            <b>${item.name}</b><br>
            Size: ${item.size}<br>
            Publisher: ${item.publisher}<br>
            Tags: ${tags.join(", ")}<br>

            <a class="download" href="${item.file}" download>Download</a>
          </div>
        </div>
      `;
    }
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", render);

/* MODAL */
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* CONSOLE WARNING */
console.log(
  "%cSTOP! DO NOT INSERT ANYTHING HERE! IT COULD BREAK THE SITE!",
  "color:#fff;background:#a855f7;padding:6px;border-radius:6px;"
);

</script>

</body>
</html>
