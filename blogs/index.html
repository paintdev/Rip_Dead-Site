<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rip_Dead Site - Blogs</title>
<link rel="icon" href="/favicon.ico">

<style>

/* ================= VOIDUI BASE ================= */

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  background:#04040a;

  opacity:0;
  transform:translateY(60px);
  transition:0.6s ease;
}

body.void-enter{opacity:1;transform:translateY(0);}
body.void-exit{opacity:0;transform:translateY(80px);}

/* VOID BACKGROUND */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 40%,rgba(150,0,255,0.30),rgba(0,0,0,0.9),#000);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 60%,rgba(168,85,247,0.2),transparent 60%),
    radial-gradient(circle at 80% 30%,rgba(0,255,200,0.1),transparent 60%);
  filter:blur(50px);
}

/* HEADER */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.back{
  padding:10px 14px;
  border-radius:10px;
  background:#a855f7;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:0.25s;
}

.back:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* BLOG LAYOUT */

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* CARD */

.card{
  width:min(650px,90%);
  background:rgba(20,20,20,0.55);
  backdrop-filter:blur(12px);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(168,85,247,0.25);
}

.date{
  font-size:12px;
  opacity:0.6;
  margin-bottom:10px;
}

/* BUTTON */

.toggle-btn{
  margin-top:10px;
  padding:10px 12px;
  border:none;
  border-radius:8px;
  background:#a855f7;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
}

.toggle-btn:hover{
  background:#c084fc;
  box-shadow:0 0 15px rgba(168,85,247,0.6);
}

/* PINNED LABEL */

.pin-title{
  opacity:0.7;
  margin-bottom:10px;
  text-align:center;
}

/* ================= READING MODE ================= */

.read-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.read-overlay.active{
  display:flex;
}

.read-box{
  width:min(800px,90%);
  max-height:85vh;
  overflow-y:auto;

  background:rgba(20,20,20,0.75);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:25px;

  transform:translateY(40px);
  opacity:0;
  transition:0.4s ease;
}

.read-overlay.active .read-box{
  transform:translateY(0);
  opacity:1;
}

.read-title{
  font-size:22px;
  margin-bottom:10px;
}

.read-date{
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.close-btn{
  position:absolute;
  top:20px;
  right:20px;

  padding:8px 12px;
  border-radius:8px;
  border:none;

  background:#a855f7;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */

footer{
  text-align:center;
  padding:25px;
  margin-top:80px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.05);
  font-size:14px;
  opacity:0.85;
}

footer a{
  color:#a855f7;
  text-decoration:none;
  font-weight:bold;
}

footer a:hover{
  color:#c084fc;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div class="title">📝 Blogs</div>
  <a class="back" href="/">← Back Home</a>
</div>

<!-- BLOG CONTAINER -->
<div class="container">

  <!-- PINNED -->
  <div id="pinned"></div>

  <!-- NORMAL -->
  <div id="blogs"></div>

</div>

<!-- READING MODE -->
<div class="read-overlay" id="overlay" onclick="closeRead(event)">
  <div class="read-box">
    <button class="close-btn" onclick="closeRead()">Close</button>

    <div class="read-date" id="rDate"></div>
    <div class="read-title" id="rTitle"></div>
    <div id="rContent"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Rip_Dead Studios™ —
  <a href="https://github.com/ripdead32/Rip_Dead-Site" target="_blank">
    <u><strong>This project is open source</strong></u>
  </a>
</footer>

<script>

let blogData = [];

/* ENTER */
window.addEventListener("DOMContentLoaded",()=>{
  document.body.classList.add("void-enter");
  loadBlogs();
});

/* EXIT TRANSITION */
document.querySelectorAll("a").forEach(a=>{
  a.addEventListener("click",(e)=>{
    if(a.target==="_blank") return;
    e.preventDefault();
    document.body.classList.add("void-exit");
    setTimeout(()=>window.location=a.href,500);
  });
});

/* LOAD CMS */
async function loadBlogs(){
  const res = await fetch("./blogs.json?cache="+Date.now());
  blogData = await res.json();

  renderPinned();
  renderBlogs();
}

/* PINNED */
function renderPinned(){
  const box = document.getElementById("pinned");
  const pinned = blogData.filter(b => b.pinned);

  if(pinned.length === 0) return;

  box.innerHTML = `<div class="pin-title">📌 Pinned</div>`;

  pinned.forEach((b,i)=>{
    box.innerHTML += `
      <div class="card" style="border:1px solid rgba(168,85,247,0.4);">
        <div class="date">${b.date}</div>
        <h2>📌 ${b.title}</h2>
        <p>${b.content.substring(0,120)}...</p>
        <button class="toggle-btn" onclick="openReadByTitle('${b.title}')">Read</button>
      </div>
    `;
  });
}

/* NORMAL BLOGS */
function renderBlogs(){
  const box = document.getElementById("blogs");
  box.innerHTML = "";

  blogData.forEach((b,i)=>{
    box.innerHTML += `
      <div class="card">
        <div class="date">${b.date}</div>
        <h2>${b.title}</h2>
        <p>${b.content.substring(0,120)}...</p>
        <button class="toggle-btn" onclick="openRead(${i})">Read</button>
      </div>
    `;
  });
}

/* READING MODE */
function openRead(i){
  const b = blogData[i];
  show(b);
}

function openReadByTitle(title){
  const b = blogData.find(x => x.title === title);
  show(b);
}

function show(b){
  document.getElementById("overlay").classList.add("active");
  document.getElementById("rTitle").innerText = b.title;
  document.getElementById("rDate").innerText = b.date;
  document.getElementById("rContent").innerText = b.content;
}

/* CLOSE */
function closeRead(e){
  if(e && e.target !== document.getElementById("overlay")) return;
  document.getElementById("overlay").classList.remove("active");
}

/* CONSOLE WARNING */
console.log(
  "%cSTOP! DO NOT INSERT ANYTHING HERE! IT COULD BREAK THE SITE!",
  "color:#fff;background:#a855f7;padding:6px;border-radius:6px;"
);

</script>

</body>
</html>
